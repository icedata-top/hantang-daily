name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact-name: hantang-daily-windows-x64
            executable: hantang-daily.exe
          - os: ubuntu-latest
            arch: amd64
            artifact-name: hantang-daily-linux-amd64
            executable: hantang-daily
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact-name: hantang-daily-linux-arm64
            executable: hantang-daily

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build with Maven (JAR + Native Image)
        run: mvn -B -Pnative package -DskipTests

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/${{ matrix.executable }}

      - name: Upload fat JAR
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: hantang-daily-jar
          path: target/*-jar-with-dependencies.jar

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          cp artifacts/hantang-daily-windows-x64/hantang-daily.exe artifacts/hantang-daily-windows-x64.exe
          cp artifacts/hantang-daily-linux-amd64/hantang-daily artifacts/hantang-daily-linux-amd64
          cp artifacts/hantang-daily-linux-arm64/hantang-daily artifacts/hantang-daily-linux-arm64
          cp artifacts/hantang-daily-jar/*.jar artifacts/hantang-daily.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/hantang-daily-windows-x64.exe
            artifacts/hantang-daily-linux-amd64
            artifacts/hantang-daily-linux-arm64
            artifacts/hantang-daily.jar
